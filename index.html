<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamVerse</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>

</head>

<body>

<div class="media-wall"></div>

<div class="container">

<h1 class="title">StreamVerse</h1>

<div class="input-area">

<div class="input-wrapper">

<input id="urlInput" type="text">

<div class="placeholder-marquee">
<span>Supported: Google Drive • MP4 • WebM • HLS (.m3u8) • DASH (.mpd)</span>
</div>

</div>

<button id="playBtn" onclick="playVideo()">Play</button>

<button id="clearBtn" onclick="clearInput()">Clear</button>

</div>

<div class="player-card">

<div id="placeholder" class="placeholder">

<div class="loader"></div>
<p>Paste a video link to start streaming</p>

</div>

<iframe id="framePlayer" allowfullscreen></iframe>

<video id="videoPlayer" controls></video>

</div>

</div>

<footer>
Developed by <b id="linkedinName">Adnan Mehraj</b>
</footer>

<script src="script.js"></script>

</body>
</html>
